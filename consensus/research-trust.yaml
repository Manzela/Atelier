# Atelier Domain Trust Lattice — Web-Research-Augmented Intake (WRAI)
#
# Trust tiers for the Relevance judge and future N14 WRAI node.
# Governs how citations from web research are scored: higher trust
# domains contribute more weight to relevance scoring; untrusted
# domains are discounted or banned entirely.
#
# References:
#   ADR 0011 — Web-Research-Augmented Intake (N14)
#   FA-020  — Domain Trust Lattice implementation feature
#   N14     — WRAI pipeline node (Phase 2)
#
# Trust score semantics:
#   1.0 = absolute authority (e.g., W3C specifications)
#   0.8+ = high confidence, minimal verification needed
#   0.5-0.8 = moderate confidence, cross-reference recommended
#   0.3-0.5 = low confidence, must be corroborated
#   0.0-0.3 = untrustworthy, active discounting applied

version: '1.0'

default_trust: 0.30

tiers:
  - name: primary_design_authority
    trust_score: 0.95
    citation_required: false
    refresh_days: 30
    domains:
      - 'developer.apple.com/design'
      - 'm3.material.io'
      - 'material.io'
      - 'nngroup.com'
      - 'dribbble.com'
      - 'behance.net'
      - 'awwwards.com'
      - 'smashingmagazine.com'
      - 'alistapart.com'

  - name: technical_reference
    trust_score: 0.90
    citation_required: false
    refresh_days: 14
    domains:
      - 'developer.mozilla.org'
      - 'mdn.io'
      - 'web.dev'
      - 'w3.org'
      - '*.gov'
      - '*.edu'
      - 'caniuse.com'
      - 'csswg.org'

  - name: vetted_journalism
    trust_score: 0.80
    citation_required: true
    refresh_days: 7
    domains:
      - 'nytimes.com'
      - 'wsj.com'
      - 'reuters.com'
      - 'ft.com'
      - 'bbc.com'
      - 'economist.com'
      - 'wired.com'
      - 'arstechnica.com'
      - 'theverge.com'

  - name: vendor_documentation
    trust_score: 0.80
    citation_required: false
    refresh_days: 7
    domains:
      - 'cloud.google.com'
      - 'developer.apple.com'
      - 'developer.android.com'
      - 'react.dev'
      - 'vuejs.org'
      - 'angular.dev'
      - 'nextjs.org'
      - 'docs.python.org'
      - 'docs.astro.build'

  - name: community
    trust_score: 0.55
    citation_required: true
    refresh_days: 3
    domains:
      - 'stackoverflow.com'
      - 'reddit.com'
      - 'github.com'
      - 'dev.to'
      - 'hashnode.dev'
      - 'medium.com'
      - 'css-tricks.com'

  - name: general_web
    trust_score: 0.30
    citation_required: true
    refresh_days: 1
    domains:
      - '*'

banned:
  # Content farms and known low-quality sources
  - 'w3schools.com'
  - 'geeksforgeeks.org'
  - 'tutorialspoint.com'
  - 'javatpoint.com'
  # SEO spam domains commonly scraped
  - '*.blogspot.com'
  - '*.wordpress.com'
  # AI-generated content farms (post-2024 proliferation)
  - '*.gpt-content.com'
  - '*.ai-articles.net'
  # Known disinformation / clickbait
  - '*.buzzfeed.com'
  - 'dailymail.co.uk'
  # Domains on common crawler spam lists
  # Source: Common Crawl spam classifier + Anthropic/OpenAI crawler exclusion lists
  - '*.freecodecamp.org/news'
