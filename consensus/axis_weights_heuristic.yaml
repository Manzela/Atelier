# Axis Weights Heuristic Configuration
#
# Default weight presets per visual_register × compliance_level × convergence_bar.
# Consumed by compute_axis_weights() in atelier.models.axis_weights.
#
# PRD Reference: §6.3 (N15 MJG)
# Audit Reference: §7 (FA-019)

# D-O-R-A-V Axis Legend:
#   D = Design (brand alignment)
#   O = Originality (creative novelty)
#   R = Relevance (content accuracy)
#   A = Accessibility (WCAG compliance)
#   V = Visual Clarity (hierarchy, readability)

visual_registers:
  corporate:
    brand: 1.2
    originality: 0.8
    relevance: 1.0
    accessibility: 1.5
    visual_clarity: 1.0
    rationale: 'Corporate clients prioritize brand consistency and accessibility compliance.'

  luxury:
    brand: 1.8
    originality: 1.2
    relevance: 0.8
    accessibility: 0.8
    visual_clarity: 1.5
    rationale: 'Luxury brands prioritize visual impact and brand alignment over strict accessibility.'

  startup:
    brand: 1.0
    originality: 1.5
    relevance: 1.0
    accessibility: 1.0
    visual_clarity: 1.2
    rationale: 'Startups value novelty and visual polish to stand out.'

  editorial:
    brand: 0.8
    originality: 1.0
    relevance: 1.8
    accessibility: 1.2
    visual_clarity: 1.0
    rationale: 'Editorial sites prioritize content relevance and readability.'

  saas:
    brand: 1.0
    originality: 0.8
    relevance: 1.2
    accessibility: 1.8
    visual_clarity: 1.2
    rationale: 'SaaS platforms need strict accessibility and functional clarity.'

  brutalist:
    brand: 1.0
    originality: 2.0
    relevance: 0.5
    accessibility: 0.5
    visual_clarity: 1.0
    rationale: 'Brutalist design intentionally breaks conventions; originality is paramount.'

  playful:
    brand: 1.0
    originality: 1.5
    relevance: 0.8
    accessibility: 1.0
    visual_clarity: 1.5
    rationale: 'Playful designs emphasize visual delight and creative expression.'

compliance_multipliers:
  wcag_aa: 1.5
  wcag_aaa: 2.0
  section_508: 1.8
  none: 0.8

convergence_multipliers:
  production: 1.0
  draft: 0.7
  prototype: 0.5
