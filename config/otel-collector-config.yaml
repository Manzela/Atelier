receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 512
  resource:
    attributes:
      - action: upsert
        key: gen_ai.system
        value: atelier

exporters:
  debug:
    verbosity: detailed # Phoenix-compatible dev exporter
  googlecloud:
    project: atelier-build-2026 # prod project
    log:
      default_log_name: atelier.agent
    trace: {}
    metric: {}

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [debug, googlecloud]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [googlecloud]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [googlecloud]
