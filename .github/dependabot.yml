# Dependabot — minimum-credit configuration
# Monthly schedule, grouped PRs, scoped to the dependency files that actually
# drive production. Ecosystems still pending content land per ROADMAP:
#   - docker /atelier-deploy    → re-enable Phase 1 D5+
#   - terraform /atelier-deploy → re-enable Phase 1 D2

version: 2

updates:
  # ─── Python (atelier-core only — workspace root has minimal deps) ────
  - package-ecosystem: 'pip'
    directory: '/atelier-core'
    schedule:
      interval: 'monthly' # was: weekly
      day: 'monday'
      time: '08:00'
      timezone: 'UTC'
    open-pull-requests-limit: 3 # hard cap to avoid CI flood
    labels: ['dependencies', 'python']
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(deps-dev)'
      include: 'scope'
    groups:
      python-all: # group ALL python bumps into 1 PR/month
        patterns: ['*']
        update-types: ['minor', 'patch']
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major'] # major bumps require manual review

  # ─── npm (workspace root + atelier-dashboard runtime deps) ──────────
  # The dashboard is an npm workspace sharing the root package-lock.json. Both
  # manifests are listed explicitly so Dependabot surfaces the shipped frontend
  # deps (next, react, firebase, framer-motion, zod) as well as the root devDeps.
  - package-ecosystem: 'npm'
    directories:
      - '/'
      - '/atelier-dashboard'
    schedule:
      interval: 'monthly'
      day: 'monday'
      time: '08:00'
      timezone: 'UTC'
    open-pull-requests-limit: 2
    labels: ['dependencies', 'npm']
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(deps-dev)'
      include: 'scope'
    groups:
      npm-all:
        patterns: ['*']
        update-types: ['minor', 'patch']
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  # ─── Python (atelier-eval — scikit-image / scipy / pillow eval stack) ──
  - package-ecosystem: 'pip'
    directory: '/atelier-eval'
    schedule:
      interval: 'monthly'
      day: 'monday'
      time: '08:00'
      timezone: 'UTC'
    open-pull-requests-limit: 3
    labels: ['dependencies', 'python']
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(deps-dev)'
      include: 'scope'
    groups:
      python-eval-all:
        patterns: ['*']
        update-types: ['minor', 'patch']
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  # ─── GitHub Actions (security-critical; quarterly) ──────────────────
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
      day: 'monday'
      time: '08:00'
      timezone: 'UTC'
    open-pull-requests-limit: 2
    labels: ['dependencies', 'github-actions']
    commit-message:
      prefix: 'ci(deps)'
      include: 'scope'
    groups:
      actions-all:
        patterns: ['*']
