# Cloud Run runtime env for the STAGING Atelier API (atelier-api-staging), the
# non-canonical pre-production tier deployed automatically on every merge to main.
# Applied verbatim by `gcloud run deploy --env-vars-file` in the deploy workflow's
# staging job. gcloud REPLACES all env on apply, so this is the COMPLETE staging
# env set (keep it in sync with api.production.env.yaml).
#
# Values that intentionally differ from production:
#   ATELIER_ENV=staging          -> staging tier; /openapi.json + /docs remain
#                                   reachable for debugging (non-judged surface).
#   ATELIER_USAGE_BACKEND=memory -> per-instance, isolated counters so staging runs
#                                   never touch the durable production token cap.
#   ATELIER_DASHBOARD_ORIGIN     -> only the staging dashboard run.app hosts.
GOOGLE_CLOUD_PROJECT: 'atelier-build-2026'
ATELIER_GCP_PROJECT: 'atelier-build-2026'
FIREBASE_PROJECT_ID: 'atelier-build-2026'
GOOGLE_CLOUD_LOCATION: 'us-central1'
GOOGLE_GENAI_USE_VERTEXAI: 'true'
SESSION_BACKEND: 'vertex'
AGENT_ENGINE_ID: '8092258795629051904'
ATELIER_ENV: 'staging'
ATELIER_USAGE_BACKEND: 'memory'
ATELIER_JUDGE_MODE: 'llm'
ATELIER_MODEL_ARMOR_ENABLED: 'true'
ATELIER_MODEL_ARMOR_TEMPLATE: 'atelier-default'
ATELIER_STITCH_ENABLED: 'false'
FIXER_MODEL: 'gemini-2.5-flash'
ATELIER_DASHBOARD_ORIGIN: 'https://atelier-dashboard-staging-537337457799.us-central1.run.app,https://atelier-dashboard-staging-2h56glloxa-uc.a.run.app'
