# Cloud Run runtime env for the PRODUCTION Atelier API (atelier-api-production),
# the service behind the canonical judged domain (atelier.autonomous-agent.dev
# -> Firebase Hosting site atelier-build-2026-21a9e -> atelier-dashboard-production
# -> this API). Applied verbatim by `gcloud run deploy --env-vars-file` in the
# deploy workflow's production job, so the production config is declarative and
# reproducible from a clean service. gcloud REPLACES all env on apply, so this
# file is the COMPLETE production env set (keep it in sync with the staging file).
#
# Values that intentionally differ from staging:
#   ATELIER_ENV=production       -> enables real axe/screenshots (--no-sandbox) and
#                                   hides /openapi.json + /docs (spec not exposed).
#   ATELIER_USAGE_BACKEND=firestore -> durable, cross-instance per-user token cap.
#   ATELIER_DASHBOARD_ORIGIN     -> the production CORS allowlist (canonical domain,
#                                   the production dashboard run.app hosts for
#                                   pre-cutover verification, and the 21a9e web.app).
GOOGLE_CLOUD_PROJECT: 'atelier-build-2026'
ATELIER_GCP_PROJECT: 'atelier-build-2026'
FIREBASE_PROJECT_ID: 'atelier-build-2026'
GOOGLE_CLOUD_LOCATION: 'us-central1'
GOOGLE_GENAI_USE_VERTEXAI: 'true'
SESSION_BACKEND: 'vertex'
AGENT_ENGINE_ID: '8092258795629051904'
ATELIER_ENV: 'production'
ATELIER_USAGE_BACKEND: 'firestore'
ATELIER_JUDGE_MODE: 'llm'
ATELIER_MODEL_ARMOR_ENABLED: 'true'
ATELIER_MODEL_ARMOR_TEMPLATE: 'atelier-default'
ATELIER_STITCH_ENABLED: 'false'
FIXER_MODEL: 'gemini-2.5-flash'
# The CORS allowlist is a single comma-joined value gcloud cannot fold; keep all
# four origins (canonical + both prod-dashboard run.app forms + the 21a9e web.app).
# yamllint disable rule:line-length
ATELIER_DASHBOARD_ORIGIN: 'https://atelier.autonomous-agent.dev,https://atelier-dashboard-production-537337457799.us-central1.run.app,https://atelier-dashboard-production-2h56glloxa-uc.a.run.app,https://atelier-build-2026-21a9e.web.app'
# yamllint enable rule:line-length
