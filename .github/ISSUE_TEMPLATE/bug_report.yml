name: Bug Report
description: Report a bug or unexpected behavior in Atelier
title: '[Bug]: '
labels: ['bug', 'triage']
assignees:
  - Manzela

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      value: |
        1. Go to '...'
        2. Run command '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages, stack traces, or logs.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Atelier is affected?
      options:
        - atelier-core (Python engine)
        - atelier-eval (evaluation suite)
        - atelier-action (GitHub Action)
        - atelier-deploy (infrastructure)
        - CI/CD workflows
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of Atelier are you using?
      placeholder: e.g., 0.1.0a0 or commit SHA
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Please provide relevant environment details.
      value: |
        - OS: [e.g., macOS 15.5, Ubuntu 24.04]
        - Python version: [e.g., 3.11.9]
        - Node version: [e.g., 22.20.0]
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or log files.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
        - label: I am using a supported version of Atelier
          required: false
