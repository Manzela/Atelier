# Cloud Build for the Atelier Studio dashboard (AT-083).
# Build context is the repo root (npm workspace). The Firebase API key is passed
# at invocation time (--substitutions=_FB_API_KEY=...) to keep it out of the
# committed file; the remaining NEXT_PUBLIC_* values are public client config.
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'atelier-dashboard/Dockerfile'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/atelier-images/atelier-dashboard:latest'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=${_API_URL}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_API_KEY=${_FB_API_KEY}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_FB_AUTH_DOMAIN}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_FB_PROJECT_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_FB_STORAGE_BUCKET}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_FB_SENDER_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_APP_ID=${_FB_APP_ID}'
      - '.'
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/atelier-images/atelier-dashboard:latest'
substitutions:
  _API_URL: 'https://atelier-api-staging-537337457799.us-central1.run.app'
  _FB_API_KEY: ''
  _FB_AUTH_DOMAIN: 'atelier-build-2026.firebaseapp.com'
  _FB_PROJECT_ID: 'atelier-build-2026'
  _FB_STORAGE_BUCKET: 'atelier-build-2026.firebasestorage.app'
  _FB_SENDER_ID: '537337457799'
  _FB_APP_ID: '1:537337457799:web:109c0fdfb86e780bc65c22'
timeout: '1200s'
options:
  machineType: 'E2_HIGHCPU_8'
