# yamllint config for Atelier
# https://yamllint.readthedocs.io/

extends: default

rules:
  line-length:
    max: 160
    level: warning
  document-start:
    present: false
  truthy:
    allowed-values: ['true', 'false', 'yes', 'no']
    check-keys: false
  comments:
    min-spaces-from-content: 1
  comments-indentation: disable
  indentation:
    spaces: 2
    indent-sequences: consistent

ignore: |
  node_modules/
  site/
  _site/
  .worktrees/
  atelier-deploy/terraform/.terraform/
