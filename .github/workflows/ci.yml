name: CI

# Minimum-viable CI for credit conservation across the user's GitHub Pro quota
# (Atelier is public so its minutes are free; other repos share the same quota
# so we still keep this lean).
#
# Triggers reduced from initial scaffold:
#   - push: only to `main` (post-merge sanity check; phase/* push skipped — phases ship via PR)
#   - pull_request: only to `main` and `phase/*` (gated entry points)
#
# Workflows deferred per ROADMAP (added back when content exists to test):
#   - eval.yml         → Phase 2 W2 (when atelier-eval has runner code)
#   - docs.yml         → Phase 3 W3 (when mkdocs.yml exists)
#   - codeql.yml       → Post-launch (Dependabot alerts + secret scanning cover MVP)
#   - stale.yml        → Post-launch (no community traffic yet to manage)

on:
  push:
    branches: [main]              # was: [main, "phase/*"]
  pull_request:
    branches: [main, "phase/*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20.11.1"
  FORCE_COLOR: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  # ─── Detect changes ──────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      eval: ${{ steps.filter.outputs.eval }}
      ci_config: ${{ steps.filter.outputs.ci_config }}
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'atelier-core/**'
              - 'pyproject.toml'
            eval:
              - 'atelier-eval/**'
            ci_config:
              - '.github/workflows/**'
              - '.pre-commit-config.yaml'
              - 'pyproject.toml'
              - 'package.json'
            docs_only:
              - 'docs/**'
              - '*.md'

  # ─── Pre-commit (always runs; cheap; catches most issues) ────────────
  precommit:
    name: pre-commit
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Install pre-commit
        run: python -m pip install pre-commit
      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  # ─── Python lint + tests (only when core/eval src changes) ───────────
  python:
    name: Python ${{ matrix.suite }}
    runs-on: ubuntu-latest
    needs: [changes, precommit]
    if: needs.changes.outputs.core == 'true' || needs.changes.outputs.eval == 'true' || needs.changes.outputs.ci_config == 'true'
    strategy:
      fail-fast: false
      matrix:
        suite: [core, eval]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Skip if subfolder has no source code yet
        id: check
        run: |
          if [ -f "atelier-${{ matrix.suite }}/pyproject.toml" ] && [ -d "atelier-${{ matrix.suite }}/src" ]; then
            # Source dir must have actual .py files beyond __init__.py
            count=$(find "atelier-${{ matrix.suite }}/src" -name "*.py" -not -name "__init__.py" -not -name "__version__.py" | wc -l)
            if [ "$count" -gt 0 ]; then
              echo "ready=true" >> "$GITHUB_OUTPUT"
            else
              echo "ready=false" >> "$GITHUB_OUTPUT"
              echo "atelier-${{ matrix.suite }}/src has only stubs — skipping (Phase 1 D3+ deliverable)"
            fi
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install dependencies
        if: steps.check.outputs.ready == 'true'
        working-directory: atelier-${{ matrix.suite }}
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .
      - name: Ruff lint
        if: steps.check.outputs.ready == 'true'
        working-directory: atelier-${{ matrix.suite }}
        run: ruff check src tests
      - name: Ruff format check
        if: steps.check.outputs.ready == 'true'
        working-directory: atelier-${{ matrix.suite }}
        run: ruff format --check src tests
      - name: mypy strict
        if: steps.check.outputs.ready == 'true'
        working-directory: atelier-${{ matrix.suite }}
        run: mypy --strict src
      - name: Unit tests
        if: steps.check.outputs.ready == 'true'
        working-directory: atelier-${{ matrix.suite }}
        run: |
          if [ -d tests/unit ] && [ "$(find tests/unit -name 'test_*.py' | wc -l)" -gt 0 ]; then
            pytest tests/unit/ -v --tb=short
          else
            echo "No unit tests yet — skipping"
          fi

  # ─── Docs link check (only on docs-only PRs; cheap) ──────────────────
  docs-links:
    name: Markdown link check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs_only == 'true' && github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install markdown-link-check
        run: npm install -g markdown-link-check@3.12.2
      - name: Check links
        run: |
          find . -name "*.md" \
            -not -path "./node_modules/*" \
            -not -path "./.worktrees/*" \
            -not -path "./site/*" \
            -exec markdown-link-check -q {} \; || true

  # ─── All-green gate (required by branch protection) ──────────────────
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [precommit, python, docs-links]
    if: always()
    steps:
      - name: Verify required jobs passed (or skipped intentionally)
        run: |
          if [[ "${{ needs.precommit.result }}" != "success" ]]; then
            echo "precommit failed: ${{ needs.precommit.result }}"
            exit 1
          fi
          for j_name in "python" "docs-links"; do
            r="${{ needs.python.result }}"
            [[ "$j_name" == "docs-links" ]] && r="${{ needs.docs-links.result }}"
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "$j_name failed: $r"
              exit 1
            fi
          done
          echo "All required CI checks passed."
