<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <title>Atelier — Trajectory Replay</title>
  <meta name="description" content="Replay and inspect individual agent sessions — span graphs, gate scorecards, and memory recalls for Atelier trajectory runs." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Text:wght@400;500&family=Roboto:wght@300;400;500&family=Roboto+Mono:wght@400;500&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
  <style>
    /* ── Material Design 3 — Light-first, Google B2C aesthetic ────────────── */
    :root {
      color-scheme: light dark;

      /* Light palette */
      --md-primary-light:              #1a73e8;
      --md-on-primary-light:           #ffffff;
      --md-primary-container-light:    #d3e3fd;
      --md-on-primary-container-light: #062e6f;
      --md-secondary-light:            #5f6368;
      --md-secondary-container-light:  #e8eaed;
      --md-on-secondary-container-light: #3c4043;
      --md-tertiary-light:             #7b1fa2;
      --md-tertiary-container-light:   #f3e5f5;
      --md-on-tertiary-container-light: #4a0072;
      --md-error-light:                #d93025;
      --md-positive-light:             #1e8e3e;
      --md-bg-light:                        #ffffff;
      --md-surface-light:                   #ffffff;
      --md-on-surface-light:                #202124;
      --md-on-surface-variant-light:        #5f6368;
      --md-surface-container-lowest-light:  #ffffff;
      --md-surface-container-low-light:     #f8f9fa;
      --md-surface-container-light:         #f1f3f4;
      --md-surface-container-high-light:    #e8eaed;
      --md-surface-container-highest-light: #dadce0;
      --md-outline-light:                   #80868b;
      --md-outline-variant-light:           #dadce0;

      /* Dark palette */
      --md-primary-dark:              #a8c7fa;
      --md-on-primary-dark:           #062e6f;
      --md-primary-container-dark:    #284290;
      --md-on-primary-container-dark: #d6e3ff;
      --md-secondary-dark:            #bec6dc;
      --md-secondary-container-dark:  #3e4759;
      --md-on-secondary-container-dark: #dae2f9;
      --md-tertiary-dark:             #ddbce8;
      --md-tertiary-container-dark:   #573d62;
      --md-on-tertiary-container-dark: #f9d8ff;
      --md-error-dark:                #ffb4ab;
      --md-positive-dark:             #81c995;
      --md-bg-dark:                        #101318;
      --md-surface-dark:                   #101318;
      --md-on-surface-dark:                #e2e2e9;
      --md-on-surface-variant-dark:        #c4c6d0;
      --md-surface-container-lowest-dark:  #0b0d13;
      --md-surface-container-low-dark:     #191b22;
      --md-surface-container-dark:         #1e2026;
      --md-surface-container-high-dark:    #282a31;
      --md-surface-container-highest-dark: #33343c;
      --md-outline-dark:                   #8e9099;
      --md-outline-variant-dark:           #44464f;

      /* Semantic tokens */
      --md-primary:              light-dark(var(--md-primary-light), var(--md-primary-dark));
      --md-on-primary:           light-dark(var(--md-on-primary-light), var(--md-on-primary-dark));
      --md-primary-container:    light-dark(var(--md-primary-container-light), var(--md-primary-container-dark));
      --md-on-primary-container: light-dark(var(--md-on-primary-container-light), var(--md-on-primary-container-dark));
      --md-secondary:            light-dark(var(--md-secondary-light), var(--md-secondary-dark));
      --md-secondary-container:  light-dark(var(--md-secondary-container-light), var(--md-secondary-container-dark));
      --md-on-secondary-container: light-dark(var(--md-on-secondary-container-light), var(--md-on-secondary-container-dark));
      --md-tertiary:             light-dark(var(--md-tertiary-light), var(--md-tertiary-dark));
      --md-tertiary-container:   light-dark(var(--md-tertiary-container-light), var(--md-tertiary-container-dark));
      --md-on-tertiary-container: light-dark(var(--md-on-tertiary-container-light), var(--md-on-tertiary-container-dark));
      --md-error:                light-dark(var(--md-error-light), var(--md-error-dark));
      --md-positive:             light-dark(var(--md-positive-light), var(--md-positive-dark));
      --md-bg:                        light-dark(var(--md-bg-light), var(--md-bg-dark));
      --md-surface:                   light-dark(var(--md-surface-light), var(--md-surface-dark));
      --md-on-surface:                light-dark(var(--md-on-surface-light), var(--md-on-surface-dark));
      --md-on-surface-variant:        light-dark(var(--md-on-surface-variant-light), var(--md-on-surface-variant-dark));
      --md-surface-container-lowest:  light-dark(var(--md-surface-container-lowest-light), var(--md-surface-container-lowest-dark));
      --md-surface-container-low:     light-dark(var(--md-surface-container-low-light), var(--md-surface-container-low-dark));
      --md-surface-container:         light-dark(var(--md-surface-container-light), var(--md-surface-container-dark));
      --md-surface-container-high:    light-dark(var(--md-surface-container-high-light), var(--md-surface-container-high-dark));
      --md-surface-container-highest: light-dark(var(--md-surface-container-highest-light), var(--md-surface-container-highest-dark));
      --md-outline:                   light-dark(var(--md-outline-light), var(--md-outline-dark));
      --md-outline-variant:           light-dark(var(--md-outline-variant-light), var(--md-outline-variant-dark));

      --md-shape-xs:   4px;
      --md-shape-sm:   8px;
      --md-shape-md:   12px;
      --md-shape-lg:   16px;
      --md-shape-full: 50px;

      --md-ease-emphasized:     cubic-bezier(0.2, 0, 0, 1);
      --md-ease-emphasized-dec: cubic-bezier(0.05, 0.7, 0.1, 1);
      --md-ease-standard:       cubic-bezier(0.2, 0, 0, 1);

      --md-dur-s2: 100ms;
      --md-dur-s4: 200ms;
      --md-dur-m2: 300ms;
      --md-dur-m4: 400ms;
      --md-dur-l2: 500ms;

      --font-sans: 'Google Sans Text', 'Roboto', system-ui, sans-serif;
      --font-mono: 'Roboto Mono', monospace;

      --sidebar-w: 300px;
      --header-h:  60px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-sans);
      background: var(--md-bg);
      color: var(--md-on-surface);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      font-size: 24px;
      line-height: 1;
      user-select: none;
    }

    /* ── Header ─────────────────────────────────────────────────────────────── */
    .header {
      height: var(--header-h);
      background: var(--md-surface-container-low);
      border-bottom: 1px solid var(--md-outline-variant);
      display: flex;
      align-items: center;
      padding: 0 16px 0 20px;
      gap: 16px;
      flex-shrink: 0;
      z-index: 10;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      text-decoration: none;
    }

    .header-brand svg {
      width: 28px;
      height: 28px;
    }

    .header-wordmark {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0;
      color: var(--md-on-surface);
      white-space: nowrap;
    }

    .header-wordmark span {
      color: var(--md-on-surface-variant);
      font-weight: 400;
    }

    .header-sep {
      width: 1px;
      height: 24px;
      background: var(--md-outline-variant);
      flex-shrink: 0;
    }

    /* Search field */
    .search-wrap {
      flex: 1;
      max-width: 480px;
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-wrap .material-symbols-outlined {
      position: absolute;
      left: 12px;
      font-size: 20px;
      color: var(--md-on-surface-variant);
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      height: 40px;
      padding: 0 14px 0 42px;
      background: var(--md-surface-container);
      border: 1px solid var(--md-outline-variant);
      border-radius: var(--md-shape-full);
      color: var(--md-on-surface);
      font-family: var(--font-mono);
      font-size: 13px;
      outline: none;  /* Reset default; :focus-visible provides accessible replacement */
      transition: border-color var(--md-dur-s4) var(--md-ease-standard),
                  background  var(--md-dur-s4) var(--md-ease-standard);
    }

    .search-input::placeholder { color: var(--md-on-surface-variant); }

    .search-input:focus {
      border-color: var(--md-primary);
      background: var(--md-surface-container-high);
    }

    /* Load button */
    .load-btn {
      height: 40px;
      padding: 0 20px;
      border-radius: var(--md-shape-full);
      background: var(--md-primary-container);
      color: var(--md-on-primary-container);
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.01em;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background var(--md-dur-s4) var(--md-ease-standard),
                  transform   var(--md-dur-s2) var(--md-ease-standard);
      white-space: nowrap;
    }

    .load-btn:hover  { background: color-mix(in srgb, var(--md-primary-container) 85%, white 15%); }
    .load-btn:active { transform: scale(0.97); }

    .load-btn .material-symbols-outlined {
      font-size: 18px;
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 18;
    }

    /* ── Layout ──────────────────────────────────────────────────────────────── */
    .layout {
      display: grid;
      grid-template-columns: 1fr var(--sidebar-w);
      flex: 1;
      overflow: hidden;
    }

    /* ── Main panel ─────────────────────────────────────────────────────────── */
    .main-panel {
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Sidebar ─────────────────────────────────────────────────────────────── */
    .sidebar {
      border-left: 1px solid var(--md-outline-variant);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .sidebar-section {
      padding: 18px 20px;
      border-bottom: 1px solid var(--md-outline-variant);
    }

    .sidebar-section:last-child { border-bottom: none; }

    /* ── Section headers ─────────────────────────────────────────────────────── */
    .section-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .section-head .material-symbols-outlined {
      font-size: 16px;
      color: var(--md-primary);
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 16;
    }

    .section-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--md-on-surface-variant);
    }

    /* ── Summary rows ───────────────────────────────────────────────────────── */
    .summary-grid {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
    }

    .summary-key {
      font-size: 12px;
      color: var(--md-on-surface-variant);
    }

    .summary-val {
      font-size: 12px;
      font-weight: 500;
      font-family: var(--font-mono);
      color: var(--md-on-surface);
      text-align: right;
    }

    .outcome-badge {
      display: inline-flex;
      height: 22px;
      padding: 0 10px;
      border-radius: var(--md-shape-xs);
      font-size: 11px;
      font-weight: 500;
      font-family: var(--font-sans);
      align-items: center;
    }

    .outcome-badge.accepted {
      background: color-mix(in srgb, var(--md-primary) 12%, transparent 88%);
      color: var(--md-primary);
    }

    .outcome-badge.rejected {
      background: color-mix(in srgb, var(--md-error) 12%, transparent 88%);
      color: var(--md-error);
    }

    .outcome-badge.error {
      background: color-mix(in srgb, var(--md-tertiary) 12%, transparent 88%);
      color: var(--md-tertiary);
    }

    /* ── Scorecard ──────────────────────────────────────────────────────────── */
    .score-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .score-row {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .score-row-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .score-name {
      font-size: 12px;
      color: var(--md-on-surface);
    }

    .score-num {
      font-size: 13px;
      font-weight: 500;
      font-family: var(--font-mono);
    }

    .score-track {
      height: 5px;
      background: var(--md-surface-container-highest);
      border-radius: var(--md-shape-full);
      overflow: hidden;
    }

    .score-fill {
      height: 100%;
      border-radius: var(--md-shape-full);
      transition: width var(--md-dur-l2) var(--md-ease-emphasized-dec);
    }

    /* ── Memory recalls ──────────────────────────────────────────────────────── */
    .recall-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .recall-card {
      background: var(--md-surface-container-low);
      border: 1px solid var(--md-outline-variant);
      border-radius: var(--md-shape-sm);
      padding: 10px 12px;
      transition: background var(--md-dur-s4) var(--md-ease-standard);
    }

    .recall-card:hover {
      background: var(--md-surface-container);
    }

    .recall-tier {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--md-tertiary);
      margin-bottom: 4px;
    }

    .recall-passage {
      font-size: 12px;
      line-height: 1.6;
      color: var(--md-on-surface-variant);
      font-style: italic;
    }

    .recall-score {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--md-positive);
      margin-top: 4px;
    }

    /* ── Span graph ──────────────────────────────────────────────────────────── */
    .span-graph-wrap {
      background: var(--md-surface-container);
      border: 1px solid var(--md-outline-variant);
      border-radius: var(--md-shape-md);
      overflow: hidden;
    }

    .span-graph-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--md-outline-variant);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .span-graph-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--md-on-surface);
    }

    .span-total-time {
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--md-on-surface-variant);
    }

    .span-list {
      padding: 8px 0;
    }

    .span-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 16px 5px 20px;
      cursor: pointer;
      transition: background var(--md-dur-s2) var(--md-ease-standard);
      position: relative;
    }

    .span-row:hover {
      background: color-mix(in srgb, var(--md-on-surface) 4%, transparent 96%);
    }

    .span-depth-line {
      position: absolute;
      left: 28px;
      top: 0;
      bottom: 0;
      width: 1px;
      background: var(--md-outline-variant);
    }

    .span-indent {
      flex-shrink: 0;
    }

    .span-node-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .span-name {
      font-size: 12px;
      font-family: var(--font-mono);
      font-weight: 500;
      color: var(--md-on-surface);
      min-width: 160px;
      max-width: 160px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .span-bar-area {
      flex: 1;
      height: 16px;
      position: relative;
      background: var(--md-surface-container-highest);
      border-radius: 3px;
      overflow: hidden;
    }

    .span-bar {
      position: absolute;
      top: 0;
      height: 100%;
      border-radius: 3px;
      min-width: 4px;
      opacity: 0.85;
      transition: opacity var(--md-dur-s4) var(--md-ease-standard);
    }

    .span-row:hover .span-bar {
      opacity: 1;
    }

    .span-duration {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--md-on-surface-variant);
      min-width: 52px;
      text-align: right;
    }

    /* ── Empty / loading states ──────────────────────────────────────────────── */
    .empty-state {
      padding: 48px 24px;
      text-align: center;
      color: var(--md-on-surface-variant);
    }

    .empty-state .material-symbols-outlined {
      font-size: 40px;
      font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 40;
      display: block;
      margin-bottom: 12px;
      color: var(--md-outline);
    }

    .empty-state p { font-size: 13px; line-height: 1.7; }

    .empty-state .hint {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--md-outline);
      margin-top: 10px;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton {
      background: linear-gradient(
        90deg,
        var(--md-surface-container)      0%,
        var(--md-surface-container-high) 50%,
        var(--md-surface-container)      100%
      );
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
      border-radius: var(--md-shape-xs);
    }

    /* ── Snackbar ─────────────────────────────────────────────────────────────── */
    .snackbar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--md-surface-container-highest);
      color: var(--md-on-surface);
      border: 1px solid var(--md-outline-variant);
      padding: 12px 20px;
      border-radius: var(--md-shape-sm);
      font-size: 13px;
      font-weight: 500;
      z-index: 100;
      transition: transform var(--md-dur-m2) var(--md-ease-emphasized-dec),
                  opacity  var(--md-dur-m2) var(--md-ease-emphasized-dec);
      opacity: 0;
      white-space: nowrap;
    }

    .snackbar.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ── Responsive ──────────────────────────────────────────────────────────── */
    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { border-left: none; border-top: 1px solid var(--md-outline-variant); }
      :root { --sidebar-w: auto; }
    }

    @media (max-width: 600px) {
      .header-wordmark { display: none; }
      .header-sep      { display: none; }
    }

    /* ── Focus ────────────────────────────────────────────────────────────── */
    :where(a, button, input, [tabindex]):focus-visible {
      outline: 3px solid var(--md-primary);
      outline-offset: 3px;
    }

    /* ── Reduced motion ───────────────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ── Visually hidden (a11y) ────────────────────────────────────────── */
    .visually-hidden:where(:not(:focus-within, :active)) {
      position: absolute !important;
      clip-path: inset(50%) !important;
      overflow: hidden !important;
      width: 1px !important;
      height: 1px !important;
      margin: -1px !important;
      padding: 0 !important;
      border: 0 !important;
      white-space: nowrap !important;
    }
    /* ── Fallback for browsers without light-dark() ──────────────────────── */
    @media (prefers-color-scheme: dark) {
      :root {
        --md-primary: var(--md-primary-dark);
        --md-on-primary: var(--md-on-primary-dark);
        --md-primary-container: var(--md-primary-container-dark);
        --md-on-primary-container: var(--md-on-primary-container-dark);
        --md-secondary: var(--md-secondary-dark);
        --md-secondary-container: var(--md-secondary-container-dark);
        --md-on-secondary-container: var(--md-on-secondary-container-dark);
        --md-tertiary: var(--md-tertiary-dark);
        --md-tertiary-container: var(--md-tertiary-container-dark);
        --md-on-tertiary-container: var(--md-on-tertiary-container-dark);
        --md-error: var(--md-error-dark);
        --md-positive: var(--md-positive-dark);
        --md-bg: var(--md-bg-dark);
        --md-surface: var(--md-surface-dark);
        --md-on-surface: var(--md-on-surface-dark);
        --md-on-surface-variant: var(--md-on-surface-variant-dark);
        --md-surface-container-lowest: var(--md-surface-container-lowest-dark);
        --md-surface-container-low: var(--md-surface-container-low-dark);
        --md-surface-container: var(--md-surface-container-dark);
        --md-surface-container-high: var(--md-surface-container-high-dark);
        --md-surface-container-highest: var(--md-surface-container-highest-dark);
        --md-outline: var(--md-outline-dark);
        --md-outline-variant: var(--md-outline-variant-dark);
      }
    }
  </style>
</head>
<body>

  <!-- Header ──────────────────────────────────────────────────────────────── -->
  <header class="header">
    <!-- Brand -->
    <a class="header-brand" href="../bench/" title="Back to Bench Observatory">
      <svg viewBox="0 0 28 28" fill="none" role="img" aria-label="Atelier">
        <rect width="28" height="28" rx="7" fill="var(--md-primary-container)"/>
        <path d="M5 22L11 9L14 16.5L17 9L23 22"
              stroke="var(--md-primary)" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="14" cy="16.5" r="1.5" fill="var(--md-primary)"/>
      </svg>
      <span class="header-wordmark">Atelier <span>/ Replay</span></span>
    </a>

    <div class="header-sep"></div>

    <!-- Search -->
    <div class="search-wrap">
      <span class="material-symbols-outlined">manage_search</span>
      <input
        class="search-input"
        id="session-input"
        type="text"
        placeholder="Enter session ID&hellip;"
        autocomplete="off"
        spellcheck="false"
        aria-label="Enter a session ID to load trajectory replay"
      />
    </div>

    <button class="load-btn" id="load-btn" aria-label="Load session replay">
      <span class="material-symbols-outlined">play_arrow</span>
      Load
    </button>

  </header>

  <!-- Layout ──────────────────────────────────────────────────────────────── -->
  <div class="layout">

    <!-- Main panel -->
    <main class="main-panel">
      <h1 class="visually-hidden">Atelier Trajectory Replay</h1>

      <!-- Span Graph ─────────────────────────────────────────────────────── -->
      <div class="span-graph-wrap" id="span-graph-wrap">
        <div class="span-graph-header">
          <span class="span-graph-title">Span Graph</span>
          <span class="span-total-time" id="total-time"></span>
        </div>
        <div id="span-graph-body">
          <div class="empty-state">
            <span class="material-symbols-outlined">account_tree</span>
            <p>Enter a session ID and press Load<br>to visualise the execution trace.</p>
          </div>
        </div>
      </div>

    </main>

    <!-- Sidebar -->
    <aside class="sidebar" role="complementary" aria-label="Session details">

      <!-- Session summary ─────────────────────────────────────────────────── -->
      <div class="sidebar-section" id="summary-section">
        <div class="section-head">
          <span class="material-symbols-outlined">summarize</span>
          <span class="section-label">Session Summary</span>
        </div>
        <div class="summary-grid" id="summary-grid">
          <div class="empty-state" style="padding:16px 0">
            <span class="material-symbols-outlined" style="font-size:28px;margin-bottom:8px">
              info
            </span>
            <p style="font-size:12px">No session loaded</p>
          </div>
        </div>
      </div>

      <!-- AND-Gate Scorecard ──────────────────────────────────────────────── -->
      <div class="sidebar-section">
        <div class="section-head">
          <span class="material-symbols-outlined">fact_check</span>
          <span class="section-label">AND-Gate Scorecard</span>
        </div>
        <div class="score-list" id="scorecard">
          <div class="skeleton" style="height:32px;border-radius:6px"></div>
          <div class="skeleton" style="height:32px;border-radius:6px;margin-top:4px"></div>
          <div class="skeleton" style="height:32px;border-radius:6px;margin-top:4px"></div>
        </div>
      </div>

      <!-- Memory Recalls ─────────────────────────────────────────────────── -->
      <div class="sidebar-section">
        <div class="section-head">
          <span class="material-symbols-outlined">memory</span>
          <span class="section-label">Memory Recalls</span>
        </div>
        <div class="recall-list" id="recall-list">
          <div class="skeleton" style="height:64px;border-radius:8px"></div>
          <div class="skeleton" style="height:64px;border-radius:8px;margin-top:4px"></div>
        </div>
      </div>

    </aside>
  </div>

  <!-- Snackbar -->
  <div class="snackbar" id="snackbar" role="status" aria-live="polite"></div>

  <script>
    /* ── CSS token reader ──────────────────────────────────────────────────── */
    const CSS = getComputedStyle(document.documentElement);
    const T   = (v) => CSS.getPropertyValue(v).trim();

    /* ── Span node colors (per pipeline node) ──────────────────────────────── */
    const NODE_COLORS = {
      'N1': T('--md-primary'),
      'N2': T('--md-positive'),
      'N3a': T('--md-tertiary'),
      'N3b': T('--md-primary-container'),
      'N4': T('--md-secondary'),
      'N5': T('--md-tertiary-container'),
      'N6': T('--md-secondary-container'),
      default: T('--md-outline'),
    };

    function nodeColor(name) {
      for (const [prefix, color] of Object.entries(NODE_COLORS)) {
        if (name.startsWith(prefix)) return color;
      }
      return NODE_COLORS.default;
    }

    /* ── Score color ───────────────────────────────────────────────────────── */
    function scoreColor(v) {
      if (v >= 0.85) return T('--md-primary');
      if (v >= 0.70) return T('--md-positive');
      if (v >= 0.55) return T('--md-tertiary');
      return T('--md-error');
    }

    /* ── Format helpers ────────────────────────────────────────────────────── */
    const mono = (v) => typeof v === 'number' ? v.toFixed(3) : v;
    const dtf  = (iso) => new Date(iso).toLocaleString(undefined, { dateStyle: 'short', timeStyle: 'medium' });

    function durLabel(ms) {
      if (!ms) return '—';
      if (ms < 1000) return `${ms.toFixed(0)} ms`;
      return `${(ms / 1000).toFixed(2)} s`;
    }

    /* ── Snackbar ──────────────────────────────────────────────────────────── */
    let snackTimer;
    function showSnack(msg) {
      const el = document.getElementById('snackbar');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(snackTimer);
      snackTimer = setTimeout(() => el.classList.remove('show'), 2800);
    }

    /* ── XSS-safe HTML escaping ────────────────────────────────────────────── */
    function escapeHTML(str) {
      if (str == null) return '';
      const el = document.createElement('span');
      el.textContent = String(str);
      return el.innerHTML;
    }

    /* ── Render span graph ─────────────────────────────────────────────────── */
    function renderSpans(spans) {
      const body = document.getElementById('span-graph-body');

      if (!spans || !spans.length) {
        body.innerHTML = `
          <div class="empty-state">
            <span class="material-symbols-outlined">account_tree</span>
            <p>No spans recorded for this session.</p>
          </div>`;
        document.getElementById('total-time').textContent = '';
        return;
      }

      const tStart = Math.min(...spans.map((s) => new Date(s.started_at).getTime()));
      const tEnd   = Math.max(...spans.map((s) => new Date(s.ended_at).getTime()));
      const total  = tEnd - tStart || 1;

      document.getElementById('total-time').textContent = durLabel(total);

      /* Build parent index */
      const children = {};
      spans.forEach((s) => {
        if (s.parent_span_id) {
          (children[s.parent_span_id] = children[s.parent_span_id] || []).push(s);
        }
      });

      function rowHTML(span, depth) {
        const sTime  = new Date(span.started_at).getTime();
        const eTime  = new Date(span.ended_at).getTime();
        const left   = ((sTime - tStart) / total * 100).toFixed(2);
        const width  = Math.max(((eTime - sTime) / total * 100), 0.5).toFixed(2);
        const color  = nodeColor(span.node_name);
        const pad    = depth * 20;
        const kids   = (children[span.span_id] || []);

        let html = `
          <div class="span-row" style="padding-left:${20 + pad}px" title="${escapeHTML(span.node_name)} — ${durLabel(span.duration_ms)}">
            ${depth > 0 ? '<div class="span-depth-line"></div>' : ''}
            <div class="span-node-dot" style="background:${color}"></div>
            <div class="span-name">${escapeHTML(span.node_name)}</div>
            <div class="span-bar-area">
              <div class="span-bar"
                   style="left:${left}%;width:${width}%;background:${color}">
              </div>
            </div>
            <div class="span-duration">${durLabel(span.duration_ms)}</div>
          </div>`;

        kids.forEach((child) => { html += rowHTML(child, depth + 1); });
        return html;
      }

      const roots = spans.filter((s) => !s.parent_span_id);
      body.innerHTML = `<div class="span-list">${roots.map((s) => rowHTML(s, 0)).join('')}</div>`;
    }

    /* ── Render summary ────────────────────────────────────────────────────── */
    function renderSummary(data) {
      const badgeCls = ['accepted', 'rejected', 'error'].includes(data.outcome) ? data.outcome : 'error';
      const started  = dtf(data.started_at);
      const dur      = durLabel(new Date(data.ended_at) - new Date(data.started_at));

      document.getElementById('summary-grid').innerHTML = `
        <div class="summary-row">
          <span class="summary-key">Session ID</span>
          <span class="summary-val" style="font-size:10px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
            ${escapeHTML(data.session_id)}
          </span>
        </div>
        <div class="summary-row">
          <span class="summary-key">Outcome</span>
          <span class="outcome-badge ${badgeCls}">${escapeHTML(data.outcome)}</span>
        </div>
        <div class="summary-row">
          <span class="summary-key">Composite score</span>
          <span class="summary-val" style="color:${scoreColor(data.composite_score)}">
            ${mono(data.composite_score)}
          </span>
        </div>
        <div class="summary-row">
          <span class="summary-key">Started</span>
          <span class="summary-val">${escapeHTML(started)}</span>
        </div>
        <div class="summary-row">
          <span class="summary-key">Duration</span>
          <span class="summary-val">${escapeHTML(dur)}</span>
        </div>
        <div class="summary-row">
          <span class="summary-key">Iteration</span>
          <span class="summary-val">${escapeHTML(String(data.iteration))}</span>
        </div>
        <div class="summary-row">
          <span class="summary-key">Candidates</span>
          <span class="summary-val">${escapeHTML(String(data.candidate_count))}</span>
        </div>
        <div class="summary-row">
          <span class="summary-key">Total cost</span>
          <span class="summary-val">$${data.total_cost_usd.toFixed(4)}</span>
        </div>
        <div class="summary-row">
          <span class="summary-key">Tokens in / out</span>
          <span class="summary-val">${escapeHTML(String(data.total_input_tokens))} / ${escapeHTML(String(data.total_output_tokens))}</span>
        </div>
        ${data.degradation_reason ? `
        <div style="margin-top:16px;padding:12px;border-radius:6px;background:color-mix(in srgb, var(--md-error) 12%, transparent 88%);border:1px solid color-mix(in srgb, var(--md-error) 30%, transparent 70%);">
          <div style="display:flex;align-items:center;gap:6px;color:var(--md-error);margin-bottom:6px;">
            <span class="material-symbols-outlined" style="font-size:16px;">warning</span>
            <span style="font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:0.04em;">Degraded Run</span>
          </div>
          <div style="font-size:12px;color:var(--md-on-surface-variant);line-height:1.5;">
            ${escapeHTML(data.user_message || data.degradation_reason)}
          </div>
        </div>
        ` : ''}
      `;
    }

    /* ── Render scorecard ──────────────────────────────────────────────────── */
    const AXIS_COLORS = {
      brand:          T('--md-primary'),
      originality:    T('--md-tertiary'),
      relevance:      T('--md-positive'),
      accessibility:  T('--md-secondary'),
      visual_clarity: T('--md-primary-container'),
    };

    function renderScorecard(scores) {
      const el = document.getElementById('scorecard');
      if (!scores || !scores.length) {
        el.innerHTML = `<p style="font-size:12px;color:var(--md-on-surface-variant)">No scores recorded.</p>`;
        return;
      }

      el.innerHTML = scores.map((s) => {
        const color = AXIS_COLORS[s.axis] || T('--md-primary');
        return `
          <div class="score-row" title="${escapeHTML(s.reasoning)}">
            <div class="score-row-head">
              <span class="score-name">${escapeHTML(s.axis.replace(/_/g, ' '))}</span>
              <span class="score-num" style="color:${scoreColor(s.score)}">${mono(s.score)}</span>
            </div>
            <div class="score-track">
              <div class="score-fill" style="width:0%;background:${color}"
                   data-w="${(s.score * 100).toFixed(1)}%"></div>
            </div>
          </div>
        `;
      }).join('');

      requestAnimationFrame(() => requestAnimationFrame(() => {
        el.querySelectorAll('[data-w]').forEach((bar) => {
          bar.style.width = bar.dataset.w;
        });
      }));
    }

    /* ── Render memory recalls ─────────────────────────────────────────────── */
    function renderRecalls(recalls) {
      const el = document.getElementById('recall-list');
      if (!recalls || !recalls.length) {
        el.innerHTML = `<p style="font-size:12px;color:var(--md-on-surface-variant)">No memory recalls in this session.</p>`;
        return;
      }
      el.innerHTML = recalls.map((r) => `
        <div class="recall-card">
          <div class="recall-tier">${escapeHTML(r.tier)}</div>
          <div class="recall-passage">&ldquo;${escapeHTML(r.passage.slice(0, 140))}${r.passage.length > 140 ? '&hellip;' : ''}&rdquo;</div>
          <div class="recall-score">similarity &thinsp; ${r.similarity.toFixed(3)}</div>
        </div>
      `).join('');
    }

    /* ── Full render ───────────────────────────────────────────────────────── */
    function render(data) {
      renderSpans(data.spans);
      renderSummary(data);
      renderScorecard(data.gate_scores);
      renderRecalls(data.memory_recalls);
    }

    /* ── Load from API ─────────────────────────────────────────────────────── */
    const API_BASE = (() => {
      const env = window.__ATELIER_API_BASE__;
      if (env) return env;
      const port = window.location.port;
      if (port === '8000' || port === '8080') return window.location.origin;
      return 'http://localhost:8080';
    })();

    async function loadSession(sessionId) {
      const btn = document.getElementById('load-btn');
      btn.disabled = true;
      btn.querySelector('span').textContent = 'hourglass_empty';

      try {
        const resp = await fetch(`${API_BASE}/v1/replay/${encodeURIComponent(sessionId)}`);
        if (resp.status === 404) {
          showSnack('Session not found.');
          return;
        }
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        render(await resp.json());
        showSnack('Session loaded.');
      } catch (err) {
        showSnack(`Error: ${err.message}`);
      } finally {
        btn.disabled = false;
        btn.querySelector('span').textContent = 'play_arrow';
      }
    }

    /* ── Event listeners ───────────────────────────────────────────────────── */
    document.getElementById('load-btn').addEventListener('click', () => {
      const id = document.getElementById('session-input').value.trim();
      if (!id) { showSnack('Enter a session ID first.'); return; }
      loadSession(id);
    });

    document.getElementById('session-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const id = e.target.value.trim();
        if (!id) { showSnack('Enter a session ID first.'); return; }
        loadSession(id);
      }
    });

  </script>
</body>
</html>
