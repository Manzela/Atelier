name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: 'atelier-build-2026'
  REGION: 'us-central1'
  NODE_VERSION: '22.13.0'

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Authenticate to GCP using WIF or Fallback Service Account Key
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Build and push API image
      - name: Build API image
        run: |
          gcloud builds submit --config deploy/cloudbuild.yaml --project=${{ env.PROJECT_ID }} .

      # Deploy API service
      - name: Deploy API to Cloud Run (Staging)
        id: deploy-api
        run: |
          gcloud run deploy atelier-api-staging \
            --image=us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/atelier-images/atelier-api:latest \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --service-account=atelier-api-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

          # Get API URL
          api_url=$(gcloud run services describe atelier-api-staging --region=${{ env.REGION }} --project=${{ env.PROJECT_ID }} --format="value(status.url)")
          echo "api_url=$api_url" >> $GITHUB_OUTPUT

      # Build and push Dashboard image (Staging config)
      - name: Build Dashboard image (Staging)
        run: |
          gcloud builds submit --config atelier-dashboard/cloudbuild.yaml \
            --project=${{ env.PROJECT_ID }} \
            --substitutions=_API_URL="${{ steps.deploy-api.outputs.api_url }}",_FB_API_KEY="${{ secrets.FIREBASE_API_KEY }}" \
            .

      # Deploy Dashboard service
      - name: Deploy Dashboard to Cloud Run (Staging)
        run: |
          gcloud run deploy atelier-dashboard-staging \
            --image=us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/atelier-images/atelier-dashboard:latest \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --allow-unauthenticated

      # Deploy to Firebase Hosting Staging target (dashboard)
      - name: Deploy Staging to Firebase Hosting
        env:
          FIREBASE_CLI_PREFILL: ${{ steps.auth.outputs.credentials_file_path }}
        run: |
          npx firebase deploy --only hosting:dashboard --project=${{ env.PROJECT_ID }}

      # Run Smoke Tests against Staging URL
      - name: Run Staging Smoke Probe
        run: |
          bash scripts/ci/smoke_probe.sh "https://atelier-build-2026-21a9e.web.app"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production # Enforces manual approval gate
    steps:
      - uses: actions/checkout@v6

      # Authenticate to GCP using WIF or Fallback Service Account Key
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Deploy API service to Production
      - name: Deploy API to Cloud Run (Production)
        id: deploy-api
        run: |
          gcloud run deploy atelier-api-production \
            --image=us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/atelier-images/atelier-api:latest \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --service-account=atelier-api-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

          # Get API URL
          api_url=$(gcloud run services describe atelier-api-production --region=${{ env.REGION }} --project=${{ env.PROJECT_ID }} --format="value(status.url)")
          echo "api_url=$api_url" >> $GITHUB_OUTPUT

      # Build and push Dashboard image (Production config)
      - name: Build Dashboard image (Production)
        run: |
          gcloud builds submit --config atelier-dashboard/cloudbuild.yaml \
            --project=${{ env.PROJECT_ID }} \
            --substitutions=_API_URL="https://atelier.autonomous-agent.dev",_FB_API_KEY="${{ secrets.FIREBASE_API_KEY }}" \
            .

      # Deploy Dashboard service to Production
      - name: Deploy Dashboard to Cloud Run (Production)
        run: |
          gcloud run deploy atelier-dashboard-production \
            --image=us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/atelier-images/atelier-dashboard:latest \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --allow-unauthenticated

      # Deploy to Firebase Hosting Production site
      - name: Deploy Production to Firebase Hosting
        env:
          FIREBASE_CLI_PREFILL: ${{ steps.auth.outputs.credentials_file_path }}
        run: |
          npx firebase deploy --only hosting:atelier-build-2026 --project=${{ env.PROJECT_ID }}

      # Run Smoke Tests against Production URL
      - name: Run Production Smoke Probe
        run: |
          bash scripts/ci/smoke_probe.sh "https://atelier.autonomous-agent.dev"
