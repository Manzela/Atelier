steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/atelier-images/atelier-api:latest'
      - '-f'
      - 'deploy/Dockerfile.api'
      - '.'
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/atelier-images/atelier-api:latest'
timeout: '600s'
options:
  machineType: 'E2_HIGHCPU_8'
