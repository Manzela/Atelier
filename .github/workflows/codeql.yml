name: 'CodeQL'

on:
  push:
    branches: [main, 'phase/*']
  pull_request:
    branches: [main, 'phase/*']
  schedule:
    # Run weekly on Mondays at 06:00 UTC
    - cron: '0 6 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360

    strategy:
      fail-fast: false
      matrix:
        # L25: the dashboard is ~15k LOC of TS/TSX — previously EXCLUDED on a false
        # "no substantive JS/TS source" justification, so DOM-XSS / taint /
        # postMessage queries never ran. `build-mode: none` extracts source without
        # a build, which is correct for both the interpreted Python tree and TS.
        include:
          - language: python
            build-mode: none
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Use extended security queries for deeper analysis
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'
