# Brutalist Design Constitution
#
# Constitution for brutalist design register. Intentionally breaks
# conventional design rules. Originality scoring is weighted heavily.
#
# CSC-D = Constitution Selector Component — Design
#
# PRD Reference: §6.3 (N6 CSC-D)
# Audit Reference: §4 (C6, FA-021)

name: brutalist
version: 1
applies_to:
  - brutalist

principles:
  - id: B1
    name: 'Raw Typography'
    description: >
      Large, bold type. Monospaced or sans-serif fonts at extreme sizes.
      Text can overlap, be rotated, or break conventional reading flow.
    weight: 1.5

  - id: B2
    name: 'Visible Structure'
    description: >
      Grid lines, borders, and structural elements are visible design
      features, not hidden infrastructure. Show the skeleton.
    weight: 1.3

  - id: B3
    name: 'Monochrome or High Contrast'
    description: >
      Black and white primary. Accent colors used dramatically and
      sparingly. No gradients unless extreme.
    weight: 1.0

  - id: B4
    name: 'Functional Honesty'
    description: >
      Links look like links. Buttons look clickable. No decoration
      that doesn't serve a purpose. Content over chrome.
    weight: 1.2

  - id: B5
    name: 'Intentional Imperfection'
    description: >
      Asymmetric layouts, overlapping elements, unconventional spacing.
      The design should feel hand-crafted, not template-generated.
    weight: 2.0

  - id: B6
    name: 'Basic Accessibility'
    description: >
      Despite unconventional design, maintain keyboard navigation
      and screen reader support. Alt text on images.
    weight: 0.8

scoring:
  minimum_pass: 0.60
  target: 0.80
  exceptional: 0.95
