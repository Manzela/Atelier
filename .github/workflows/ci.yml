name: CI

# Minimum-viable CI for credit conservation across the user's GitHub Pro quota
# (Atelier is public so its minutes are free; other repos share the same quota
# so we still keep this lean).
#
# Triggers reduced from initial scaffold:
#   - push: only to `main` (post-merge sanity check; phase/* push skipped — phases ship via PR)
#   - pull_request: only to `main` and `phase/*` (gated entry points)
#
# Workflows deferred per ROADMAP (added back when content exists to test):
#   - eval.yml         → Phase 2 W2 (when atelier-eval has runner code)
#   - docs.yml         → Phase 3 W3 (when mkdocs.yml exists)
#   - codeql.yml       → Post-launch (Dependabot alerts + secret scanning cover MVP)
#   - stale.yml        → Post-launch (no community traffic yet to manage)

on:
  push:
    branches: [main, 'phase/*']
  pull_request:
    branches: [main, 'phase/*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.11'
  # 22.13.0 (LTS): the Next 16 / React 19 dashboard toolchain (eslint-visitor-keys
  # etc.) requires node ^20.19 || ^22.13 || >=24; 20.11.1 crashed eslint in the
  # Dashboard job. Matches the locally-verified node-22 build.
  NODE_VERSION: '22.13.0'
  FORCE_COLOR: '1'
  PYTHONUNBUFFERED: '1'

jobs:
  # ─── Detect changes ──────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      eval: ${{ steps.filter.outputs.eval }}
      ci_config: ${{ steps.filter.outputs.ci_config }}
      docs_only: ${{ steps.filter.outputs.docs_only }}
      tokens: ${{ steps.filter.outputs.tokens }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      firestore: ${{ steps.filter.outputs.firestore }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            core:
              - 'atelier-core/**'
              - 'pyproject.toml'
            eval:
              - 'atelier-eval/**'
            ci_config:
              - '.github/workflows/**'
              - '.pre-commit-config.yaml'
              - 'pyproject.toml'
              - 'package.json'
            docs_only:
              - 'docs/**'
              - '*.md'
            tokens:
              - 'design-tokens/**'
              - 'scripts/**'
              - 'package.json'
              - 'package-lock.json'
              - 'lighthouserc.json'
            dashboard:
              - 'atelier-dashboard/**'
              - 'package.json'
              - 'package-lock.json'
            firestore:
              - 'firestore.rules'
              - 'firestore.indexes.json'
              - 'firebase.json'
              - 'firestore-tests/**'
              - 'atelier-dashboard/package.json'
              - 'package-lock.json'

  # ─── Pre-commit (always runs; cheap; catches most issues) ────────────
  precommit:
    name: pre-commit
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Cache pre-commit
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Install Node dependencies
        run: npm ci
      - name: Install pre-commit
        run: python -m pip install pre-commit
      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  # ─── Python lint + tests (only when core/eval src changes) ───────────
  python:
    name: Python ${{ matrix.suite }}
    runs-on: ubuntu-latest
    needs: [changes, precommit]
    if: needs.changes.outputs.core == 'true' || needs.changes.outputs.eval == 'true' || needs.changes.outputs.ci_config == 'true'
    strategy:
      fail-fast: false
      matrix:
        suite: [core, eval]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Skip if subfolder has no source code yet
        id: check
        run: |
          if [ -f "atelier-${{ matrix.suite }}/pyproject.toml" ] && [ -d "atelier-${{ matrix.suite }}/src" ]; then
            # Source dir must have actual .py files beyond __init__.py
            count=$(find "atelier-${{ matrix.suite }}/src" -name "*.py" -not -name "__init__.py" -not -name "__version__.py" | wc -l)
            if [ "$count" -gt 0 ]; then
              echo "ready=true" >> "$GITHUB_OUTPUT"
            else
              echo "ready=false" >> "$GITHUB_OUTPUT"
              echo "atelier-${{ matrix.suite }}/src has only stubs — skipping (Phase 1 D3+ deliverable)"
            fi
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install dependencies
        if: steps.check.outputs.ready == 'true'
        working-directory: atelier-${{ matrix.suite }}
        run: |
          python -m pip install --upgrade pip
          if [ -f "../requirements.lock" ]; then
            pip install -r ../requirements.lock
          fi
          pip install -e ".[dev]" || pip install -e .
      - name: Install chromium for real axe-core browser tests (AT-011)
        # Core only: exercises the @pytest.mark.browser axe-core gate tests for real
        # (the credibility core / AT-007 dep). Without this they self-skip.
        if: steps.check.outputs.ready == 'true' && matrix.suite == 'core'
        working-directory: atelier-core
        run: python -m playwright install --with-deps chromium
      - name: Ruff lint
        if: steps.check.outputs.ready == 'true'
        working-directory: atelier-${{ matrix.suite }}
        run: ruff check src tests
      - name: Ruff format check
        if: steps.check.outputs.ready == 'true'
        working-directory: atelier-${{ matrix.suite }}
        run: ruff format --check src tests
      - name: mypy strict
        if: steps.check.outputs.ready == 'true'
        working-directory: atelier-${{ matrix.suite }}
        run: mypy --strict src
      - name: Unit tests
        if: steps.check.outputs.ready == 'true'
        working-directory: atelier-${{ matrix.suite }}
        run: |
          if [ -d tests/unit ] && [ "$(find tests/unit -name 'test_*.py' | wc -l)" -gt 0 ]; then
            pytest tests/unit/ -v --tb=short
          else
            echo "No unit tests yet — skipping"
          fi

  # ─── Hygiene gate (always runs; rejects emoji + AI-authorship tells) ────
  hygiene:
    name: Hygiene gate
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Run hygiene gate
        run: python scripts/check_hygiene.py

  # ─── Docs link check (only on docs-only PRs; cheap) ──────────────────
  docs-links:
    name: Markdown link check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs_only == 'true' && github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install markdown-link-check
        run: npm install -g markdown-link-check@3.12.2
      - name: Check links
        run: |
          find . -name "*.md" \
            -not -path "./node_modules/*" \
            -not -path "./.worktrees/*" \
            -not -path "./site/*" \
            -exec markdown-link-check -q {} \; || true

  # ─── Design-token build (only when tokens / deps change) ─────────────
  tokens:
    name: Token build (Style Dictionary)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.tokens == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies (lockfile)
        run: npm ci
      - name: Build tokens (DTCG → CSS/Tailwind/Swift/Kotlin)
        run: npm run build:tokens
      - name: Verify all four platform outputs were produced
        run: |
          set -euo pipefail
          for f in \
            design-tokens/build/css/variables.css \
            design-tokens/build/tailwind/tokens.js \
            design-tokens/build/swift/AtelierTokens.swift \
            design-tokens/build/kotlin/AtelierTokens.kt; do
            test -s "$f" || { echo "missing/empty output: $f"; exit 1; }
          done
          echo "All four Style Dictionary outputs present and non-empty."
      - name: AT-052 token round-trip proof (sentinel propagation to all 4 surfaces)
        run: node scripts/verify-token-roundtrip.mjs

  # ─── Dashboard (Next.js Studio) typecheck + lint + build ─────────────
  dashboard:
    name: Dashboard (Next.js Studio)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.dashboard == 'true' || needs.changes.outputs.ci_config == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies (lockfile)
        run: npm ci
      - name: Typecheck (tsc --noEmit --strict)
        working-directory: atelier-dashboard
        run: npm run typecheck
      - name: Lint (eslint)
        working-directory: atelier-dashboard
        run: npm run lint
      - name: Build (next build)
        working-directory: atelier-dashboard
        run: npm run build

  # ─── Dashboard Playwright E2E (matrixed over the A2UI render flag) ─────
  # Two legs, full suite each:
  #   off → NEXT_PUBLIC_A2UI_RENDER=0: the A2UI payload is inert; a2ui-render.spec
  #         self-skips (test.skip on the flag), at044 asserts the hand-built
  #         `ds-panel` fallback renders.
  #   on  → NEXT_PUBLIC_A2UI_RENDER=1: the A2UI render path is exercised
  #         (a2ui-render.spec runs + its axe assertion executes), at044 still
  #         passes (its fixture carries `tokens`, not `a2ui_payload`, so the
  #         shell falls back to `ds-panel`).
  #
  # The flag is read at BUILD time (Next inlines NEXT_PUBLIC_*), so the job-level
  # `env:` below MUST be present for the Playwright webServer's `npm run build`.
  # Playwright's webServer subprocess inherits the job env by default (no `env:`
  # map on webServer in playwright.config.ts) — do NOT add one there or it will
  # shadow this inherited value and the on-leg would build flag-off.
  dashboard-e2e:
    name: Dashboard E2E (A2UI flag ${{ matrix.a2ui_flag }})
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.dashboard == 'true' || needs.changes.outputs.ci_config == 'true'
    strategy:
      fail-fast: false
      matrix:
        # Quoted: bare off/on are YAML boolean literals (→ false/true); we need
        # the literal strings 'off'/'on' for the env expression + artifact names.
        a2ui_flag: ['off', 'on']
    env:
      NEXT_PUBLIC_A2UI_RENDER: ${{ matrix.a2ui_flag == 'on' && '1' || '0' }}
      # The mocked Playwright suite intercepts **/v1/generate/stream. Point the
      # build's API origin at the dashboard's own origin (localhost:3000) so the
      # fetch is same-origin and permitted by the REAL shipped production CSP
      # (connect-src 'self'), rather than the localhost:8000 default the policy
      # intentionally blocks. This exercises the production CSP unmodified — the
      # mock fulfils the request, the request just has to be allowed to leave.
      NEXT_PUBLIC_API_URL: http://localhost:3000
      # CI-only opt-in (NEVER set in the deploy workflow) that re-enables the
      # dev-mode login bypass under this production-mode build so the
      # login→authenticated flow stays covered. Hard-guarded by !isFirebaseConfigured,
      # so it cannot affect a real deploy (which always configures Firebase).
      NEXT_PUBLIC_E2E: '1'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies (lockfile)
        run: npm ci
      - name: Install Playwright Chromium
        working-directory: atelier-dashboard
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        working-directory: atelier-dashboard
        run: npx playwright test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.a2ui_flag }}
          path: atelier-dashboard/playwright-report
          retention-days: 14
      - name: Upload test results (includes Linux reference PNGs)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results-${{ matrix.a2ui_flag }}
          path: atelier-dashboard/test-results
          retention-days: 14

  # ─── A2UI @a2ui/web_core dependency-skew guard (G7, ADR-0024) ─────────
  # The renderer bridges two intentional copies of @a2ui/web_core (0.9.2 under
  # @a2ui/markdown-it, 0.10.0 under @a2ui/react) with `as unknown as` casts that
  # are runtime-safe ONLY because the SurfaceModel/Catalog/DataModel decls are
  # byte-identical across exactly that pair. This guard makes the two-version
  # invariant machine-checked: a drift to a third version blocks merge.
  a2ui-skew:
    name: A2UI web_core skew guard
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ci_config == 'true' || needs.changes.outputs.dashboard == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies (lockfile)
        run: npm ci
      - name: Check @a2ui/web_core version skew
        run: node scripts/ci/check-a2ui-skew.mjs

  # ─── Reviewer DONE-evidence gate (AT-102, PRD v2.2 §12 E10 / §8A) ───
  reviewer-envelope-gate:
    name: Reviewer envelope gate (AT-102)
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install atelier-core deps (needed for independent re-run)
        working-directory: atelier-core
        run: |
          python -m pip install --upgrade pip
          if [ -f "../requirements.lock" ]; then
            pip install -r ../requirements.lock
          fi
          pip install -e ".[dev]" || pip install -e .
      - name: Install chromium for axe-core gate tests
        working-directory: atelier-core
        run: python -m playwright install --with-deps chromium
      - name: Run reviewer envelope gate
        run: python scripts/ci/verify_reviewer_envelope.py

  # ─── Firestore security-rules isolation test (AT-084, PRD v2.2 §12 E8) ──
  firestore-rules:
    name: Firestore rules (tenant isolation)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.firestore == 'true' || needs.changes.outputs.ci_config == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies (lockfile)
        run: npm ci
      - name: Run Firestore rules isolation test against the emulator
        # firebase-tools is pulled from the lockfile-pinned workspace deps.
        # emulators:exec boots the Firestore emulator, runs the node:test
        # suite, then tears the emulator down; a failing assertion (e.g. a
        # cross-tenant read that unexpectedly succeeds) propagates as exit 1.
        run: npx firebase emulators:exec --only firestore "node --test firestore-tests/firestore-rules.test.mjs"

  # ─── Docker image build + container smoke (AT-101b) ──────────────────
  # Builds the production API image and proves the container actually starts and
  # serves /health. Catches Dockerfile breaks and import/startup crashes (e.g. a
  # required env var that is missing) before they reach a deploy.
  docker-build:
    name: Docker build + container smoke
    runs-on: ubuntu-latest
    needs: [changes, precommit]
    if: needs.changes.outputs.core == 'true' || needs.changes.outputs.ci_config == 'true'
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Build the API image
        run: docker build -f deploy/Dockerfile.api -t atelier-api:ci .
      - name: Verify auth-critical runtime deps import
        # firebase-admin is lazy-imported (only at token verification), so a
        # missing runtime dependency does not crash startup or fail the /health
        # smoke — it silently breaks every authenticated request. Import the
        # auth-critical modules explicitly so the image's dependency set can not
        # drift from atelier-core/pyproject.toml unnoticed.
        #
        # FIREBASE_PROJECT_ID is supplied because the image bakes
        # ATELIER_ENV=production and atelier.auth.firebase fails loud at import
        # if the project id is unset outside development (M-8) — the same env the
        # real Cloud Run service provides; here it only needs to be non-empty.
        run: docker run --rm -e FIREBASE_PROJECT_ID=ci-smoke atelier-api:ci python -c "import firebase_admin; import atelier.api.app; print('auth-critical deps import OK')"
      - name: Start the container
        run: |
          docker run -d --name atelier-api-ci \
            -e PORT=8080 \
            -e ATELIER_ENV=production \
            -e FIREBASE_PROJECT_ID=ci-smoke \
            -p 8080:8080 \
            atelier-api:ci
      - name: Smoke the health endpoint
        run: |
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:8080/health; then
              echo
              echo "container is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "container did not become healthy within 60s"
          exit 1
      - name: Container logs
        if: always()
        run: docker logs atelier-api-ci || true

  # ─── Security Scan (Hardening: RR-01, RR-02, RR-05) ──────────────────
  security:
    name: Security audit (Hardening)
    runs-on: ubuntu-latest
    needs: [changes, precommit]
    if: needs.changes.outputs.core == 'true' || needs.changes.outputs.ci_config == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install security tools
        run: pip install bandit[sarif] semgrep
      - name: Bandit scan (Python)
        # Emit SARIF for the security tab AND gate the job: a finding at
        # MEDIUM+ severity and confidence exits non-zero (RR-03). The `|| true`
        # that silently swallowed every finding is removed. `if: always()` on
        # the upload below still publishes the SARIF even when this fails.
        run: bandit -r atelier-core/src -f sarif -o bandit-results.sarif --severity-level medium --confidence-level medium
      - name: Upload Bandit results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit-results.sarif
      - name: Semgrep scan
        # `--error` makes semgrep exit non-zero when its ruleset finds a match,
        # so a hit fails the job instead of being swallowed by `|| true`.
        run: semgrep scan --config auto --error --sarif --output semgrep-results.sarif
      - name: Upload Semgrep results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-results.sarif
      - name: Trivy FS scan (Vulnerabilities + Misconfigurations)
        # Pinned to a released tag (v0.36.0, clear of GHSA-69fq-xp46-6x23 and
        # GHSA-9p44-j4g5-cfx5 which affect 0.31.0-0.34.x) rather than the moving
        # @master, and exit-code:1 so CRITICAL/HIGH findings fail the job (RR-03).
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

  # ─── All-green gate (required by branch protection) ──────────────────
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs:
      [
        precommit,
        hygiene,
        python,
        docs-links,
        tokens,
        dashboard,
        dashboard-e2e,
        a2ui-skew,
        firestore-rules,
        reviewer-envelope-gate,
        docker-build,
        security,
      ]
    if: always()
    steps:
      - name: Verify required jobs passed (or skipped intentionally)
        run: |
          if [[ "${{ needs.precommit.result }}" != "success" ]]; then
            echo "precommit failed: ${{ needs.precommit.result }}"
            exit 1
          fi
          if [[ "${{ needs.hygiene.result }}" != "success" ]]; then
            echo "hygiene failed: ${{ needs.hygiene.result }}"
            exit 1
          fi
          if [[ "${{ needs.reviewer-envelope-gate.result }}" != "success" ]]; then
            echo "reviewer-envelope-gate failed: ${{ needs.reviewer-envelope-gate.result }}"
            exit 1
          fi
          # Security is a hard gate (RR-03): a failed or cancelled security
          # audit must fail ci-success. `skipped` is acceptable — the security
          # job's own `if:` self-skips on PRs that touch neither core nor
          # ci_config, and a skip is the absence of a finding, not a pass.
          if [[ "${{ needs.security.result }}" == "failure" || "${{ needs.security.result }}" == "cancelled" ]]; then
            echo "security failed: ${{ needs.security.result }}"
            exit 1
          fi
          for j_name in "python" "docs-links" "tokens" "dashboard" "dashboard-e2e" "a2ui-skew" "firestore-rules" "docker-build"; do
            r="${{ needs.python.result }}"
            [[ "$j_name" == "docs-links" ]] && r="${{ needs.docs-links.result }}"
            [[ "$j_name" == "tokens" ]] && r="${{ needs.tokens.result }}"
            [[ "$j_name" == "dashboard" ]] && r="${{ needs.dashboard.result }}"
            [[ "$j_name" == "dashboard-e2e" ]] && r="${{ needs.dashboard-e2e.result }}"
            [[ "$j_name" == "a2ui-skew" ]] && r="${{ needs.a2ui-skew.result }}"
            [[ "$j_name" == "firestore-rules" ]] && r="${{ needs.firestore-rules.result }}"
            [[ "$j_name" == "docker-build" ]] && r="${{ needs.docker-build.result }}"
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "$j_name failed: $r"
              exit 1
            fi
          done
          echo "All required CI checks passed."
