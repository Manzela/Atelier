name: features.json schema validation

on:
  pull_request:
    paths:
      - 'features.json'
  push:
    branches:
      - 'phase/*'
      - 'main'
    paths:
      - 'features.json'

permissions:
  contents: read

jobs:
  validate-features-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Gate 1 — evidence_tests type must be array
        run: |
          non_array=$(jq '[.features[] | select(.evidence_tests | type != "array")] | length' features.json)
          if [ "$non_array" -gt 0 ]; then
            echo "::error::${non_array} features have non-array evidence_tests"
            jq '.features[] | select(.evidence_tests | type != "array") | {id, evidence_tests_type: (.evidence_tests | type)}' features.json
            exit 1
          fi
          echo "✅ All features have array-typed evidence_tests"

      - name: Gate 2 — no passes:true without evidence
        run: |
          no_evidence=$(jq '[.features[] | select(.passes==true and (.evidence_tests | length)==0)] | length' features.json)
          if [ "$no_evidence" -gt 0 ]; then
            echo "::error::${no_evidence} features have passes:true with empty evidence_tests"
            jq '.features[] | select(.passes==true and (.evidence_tests | length)==0) | .id' features.json
            exit 1
          fi
          echo "✅ All passing features have backing evidence_tests"

      - name: Gate 3 — schema completeness
        run: |
          # Every feature must have: id (string), passes (bool), evidence_tests (array)
          malformed=$(jq '[.features[] | select(
            (.id | type) != "string" or
            (.passes | type) != "boolean" or
            (.evidence_tests | type) != "array"
          )] | length' features.json)
          if [ "$malformed" -gt 0 ]; then
            echo "::error::${malformed} features have malformed schema (missing id/passes/evidence_tests)"
            jq '.features[] | select(
              (.id | type) != "string" or
              (.passes | type) != "boolean" or
              (.evidence_tests | type) != "array"
            ) | .id' features.json
            exit 1
          fi
          echo "✅ All features conform to required schema"

      - name: Summary
        run: |
          total=$(jq '.features | length' features.json)
          passing=$(jq '[.features[] | select(.passes==true)] | length' features.json)
          failing=$(jq '[.features[] | select(.passes==false)] | length' features.json)
          echo "### features.json Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total features | ${total} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Passing | ${passing} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Failing | ${failing} |" >> "$GITHUB_STEP_SUMMARY"
