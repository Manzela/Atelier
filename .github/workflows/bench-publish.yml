name: bench-publish
on:
  schedule:
    - cron: '17 3 * * *'
  push:
    branches: ['main', 'phase/*']
  workflow_dispatch:

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      has_wif: ${{ steps.check.outputs.has_wif }}
    steps:
      - id: check
        env:
          WIF: ${{ secrets['GCP_WORKLOAD_IDENTITY_PROVIDER'] }}
        run: |
          if [ -n "$WIF" ]; then
            echo "has_wif=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_wif=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: check-secrets
    if: needs.check-secrets.outputs.has_wif == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets['GCP_WORKLOAD_IDENTITY_PROVIDER'] }}
          service_account: ${{ secrets['GCP_SERVICE_ACCOUNT'] }}

      - name: Install Python dependencies
        run: |
          pip install -r requirements.lock
          pip install -e atelier-core/

      - name: Generate bench dashboard data
        run: python atelier-core/scripts/generate_bench_data.py --out docs/dashboards/bench/data.json

      - name: Deploy to Firebase Hosting
        run: |
          npm install -g firebase-tools@13
          firebase deploy --only hosting --project atelier-build-2026

      - name: Deploy to Vertex AI Agent Engine
        run: |
          # Requires google-cloud-aiplatform and ADK 2.0 dependencies
          python atelier-core/src/atelier/agent_engine_deploy.py
