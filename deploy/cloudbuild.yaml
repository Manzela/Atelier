steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/atelier-images/atelier-api:${_IMAGE_TAG}'
      - '-f'
      - 'deploy/Dockerfile.api'
      - '.'
images:
  # L51: build/push ONLY the immutable ${_IMAGE_TAG} (the commit SHA, supplied by
  # the deploy workflow). The mutable :latest tag is no longer produced — it was a
  # latent foot-gun (a manual deploy could pin a moving target). _IMAGE_TAG has no
  # default, so a build that forgets to supply it fails loudly rather than tagging
  # :latest.
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/atelier-images/atelier-api:${_IMAGE_TAG}'
timeout: '600s'
# Run the build as a least-privilege SA (push images + read source + write logs)
# instead of the default Compute Engine SA, which holds project Editor — a CI
# build must not be able to run arbitrary steps with project-wide write. A
# user-specified service account cannot use the default Google-owned logs
# bucket, so logging is pinned to Cloud Logging.
serviceAccount: 'projects/atelier-build-2026/serviceAccounts/atelier-cloudbuild@atelier-build-2026.iam.gserviceaccount.com'
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
