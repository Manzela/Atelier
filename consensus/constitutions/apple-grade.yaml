# Apple-Grade Design Constitution
#
# This constitution defines the quality standards for "apple-grade" design.
# It is loaded into the ConsensusAgent (N3d) as a system prompt constraint
# when BriefSpec.visual_register indicates premium/luxury design.
#
# CSC-D = Constitution Selector Component — Design
# Mounted read-only in Docker: consensus/ → /app/consensus/ (FA-009)
#
# PRD Reference: §6.3 (N6 CSC-D)
# Audit Reference: §4 (C6, FA-021)

name: apple-grade
version: 1
applies_to:
  - luxury
  - corporate
  - saas

principles:
  - id: P1
    name: 'Pixel-Perfect Precision'
    description: >
      Every element must be precisely aligned. Use an 8px grid system.
      No fractional pixels. Consistent spacing throughout.
    weight: 1.5

  - id: P2
    name: 'Restrained Color Palette'
    description: >
      Maximum 5 colors including neutrals. Primary color used sparingly
      for CTAs and key interactive elements. Large areas use neutrals.
    weight: 1.2

  - id: P3
    name: 'Typography Hierarchy'
    description: >
      Clear visual hierarchy with maximum 3 font sizes visible at once.
      Headlines contrast with body text. Line height ≥ 1.5 for body.
    weight: 1.3

  - id: P4
    name: 'Generous Whitespace'
    description: >
      Content breathes. Minimum 24px padding on content containers.
      Section spacing ≥ 48px. No visual clutter.
    weight: 1.4

  - id: P5
    name: 'Micro-Interactions'
    description: >
      Buttons, links, and interactive elements have hover states.
      Transitions use ease-out, 200-300ms duration. No jarring changes.
    weight: 0.8

  - id: P6
    name: 'Accessibility as Design'
    description: >
      Color contrast ≥ 4.5:1 for body text, ≥ 3:1 for large text.
      Focus indicators visible. Skip navigation present.
    weight: 1.0

  - id: P7
    name: 'Progressive Disclosure'
    description: >
      Show only what's needed. Secondary actions behind menus or
      expandable sections. Primary CTA immediately visible.
    weight: 1.1

scoring:
  minimum_pass: 0.70
  target: 0.85
  exceptional: 0.95
