name: bench-publish
on:
  schedule:
    - cron: '17 3 * * *'
  push:
    branches: ['main', 'phase/*']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    # Skip the entire job when GCP secrets are not configured.
    # This prevents failures on forks and branches where
    # Workload Identity Federation has not been set up.
    if: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != '' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Install Python dependencies
        run: |
          pip install -r requirements.lock
          pip install -e atelier-core/

      - name: Generate bench dashboard data
        run: python atelier-core/scripts/generate_bench_data.py --out docs/dashboards/bench/data.json

      - name: Deploy to Firebase Hosting
        run: |
          npm install -g firebase-tools@13
          firebase deploy --only hosting --project atelier-build-2026
