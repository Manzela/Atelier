# Dependabot — minimum-credit configuration
# Reduced from initial scaffold: monthly schedule, grouped PRs, only ecosystems
# with real deps right now. Additional ecosystems added back per ROADMAP as
# their content lands:
#   - pip /atelier-eval         → re-enable Phase 2 W2
#   - npm /atelier-dashboard    → re-enable Phase 2 W2
#   - docker /atelier-deploy    → re-enable Phase 1 D5+
#   - terraform /atelier-deploy → re-enable Phase 1 D2

version: 2

updates:
  # ─── Python (atelier-core only — workspace root has minimal deps) ────
  - package-ecosystem: 'pip'
    directory: '/atelier-core'
    schedule:
      interval: 'monthly' # was: weekly
      day: 'monday'
      time: '08:00'
      timezone: 'UTC'
    open-pull-requests-limit: 3 # hard cap to avoid CI flood
    labels: ['dependencies', 'python']
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(deps-dev)'
      include: 'scope'
    groups:
      python-all: # group ALL python bumps into 1 PR/month
        patterns: ['*']
        update-types: ['minor', 'patch']
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major'] # major bumps require manual review

  # ─── npm (workspace root: commitlint + prettier + typescript only) ──
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
      day: 'monday'
      time: '08:00'
      timezone: 'UTC'
    open-pull-requests-limit: 2
    labels: ['dependencies', 'npm']
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(deps-dev)'
      include: 'scope'
    groups:
      npm-all:
        patterns: ['*']
        update-types: ['minor', 'patch']
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  # ─── GitHub Actions (security-critical; quarterly) ──────────────────
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
      day: 'monday'
      time: '08:00'
      timezone: 'UTC'
    open-pull-requests-limit: 2
    labels: ['dependencies', 'github-actions']
    commit-message:
      prefix: 'ci(deps)'
      include: 'scope'
    groups:
      actions-all:
        patterns: ['*']
