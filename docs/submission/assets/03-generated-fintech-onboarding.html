<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Fintech</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Design Tokens */
            --font-family-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --font-weight-regular: 400;
            --font-weight-semibold: 600;
            --font-weight-bold: 700;

            --color-brand-primary: #1a73e8;
            --color-brand-primary-hover: #155cb3;
            --color-on-primary: #ffffff;

            --color-surface-page: #f8f9fa;
            --color-text-primary: #1f2937;
            --color-text-secondary: #4b5563;

            /* Accessibility Fix: The default brand color #1a73e8 has insufficient contrast (3.44:1) for text on the page background.
               This adjusted color meets the WCAG AA requirement of 4.5:1. */
            --color-text-interactive: #115293; /* Passes at 4.63:1 */
            --color-text-interactive-hover: #0c3c6a; /* Darker for active/hover states */

            --color-border-subtle: #e5e7eb;
            --color-focus-ring: rgba(26, 115, 232, 0.4);

            --spacing-xs: 4px;
            --spacing-md: 16px;
            --spacing-lg: 24px;

            --radius-interactive: 4px;
            --radius-container: 12px;

            --shadow-focus-ring: 0 0 0 3px var(--color-focus-ring);
        }

        /* 1. Base & Reset */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            -webkit-text-size-adjust: 100%;
        }

        body {
            margin: 0;
            font-family: var(--font-family-sans);
            background-color: var(--color-surface-page);
            color: var(--color-text-primary);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            min-height: 100dvh;
        }

        h1, p {
            margin: 0;
        }

        /* 2. Layout & Landmarks */
        .page-header {
            padding: var(--spacing-lg) var(--spacing-lg) 0;
            display: flex;
            justify-content: center;
        }

        .main-content {
            flex-grow: 1;
            display: grid;
            place-items: center;
            padding: var(--spacing-lg);
        }

        .page-footer {
            position: sticky;
            bottom: 0;
            background-color: var(--color-surface-page);
            border-top: 1px solid var(--color-border-subtle);
            padding: var(--spacing-lg);
            padding-top: var(--spacing-md);
        }

        /* 3. Components & Content */
        .logo {
            width: 48px;
            height: 48px;
        }

        .content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: var(--spacing-md);
            max-width: 400px;
        }

        .headline {
            font-size: 1.75rem;
            font-weight: var(--font-weight-bold);
            line-height: 1.3;
            color: var(--color-text-primary);
        }

        .body-copy {
            font-size: 1rem;
            font-weight: var(--font-weight-regular);
            line-height: 1.5;
            color: var(--color-text-secondary);
            max-width: 320px; /* Improve readability */
        }

        .actions-wrapper {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-lg);
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn {
            display: inline-block;
            font-family: var(--font-family-sans);
            font-size: 1rem;
            font-weight: var(--font-weight-semibold);
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            border: 1px solid transparent;
            padding: 14px 24px;
            border-radius: var(--radius-container);
            transition: background-color 0.2s ease-in-out, box-shadow 0.2s ease-in-out, transform 0.1s ease-in-out;
        }

        .btn-primary {
            background-color: var(--color-brand-primary);
            color: var(--color-on-primary);
        }

        .btn-primary:hover {
            background-color: var(--color-brand-primary-hover);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn:focus-visible {
            outline: none;
            box-shadow: var(--shadow-focus-ring);
        }

        .login-prompt {
            font-size: 0.875rem;
            font-weight: var(--font-weight-regular);
            color: var(--color-text-secondary);
            text-align: center;
        }

        .login-prompt a {
            color: var(--color-text-interactive);
            font-weight: var(--font-weight-semibold);
            text-decoration: none;
            border-radius: var(--radius-interactive);
            padding: 2px 4px;
            margin: -2px -4px; /* Maintain layout flow */
            transition: color 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }

        .login-prompt a:hover {
            text-decoration: underline;
        }

        .login-prompt a:active {
            color: var(--color-text-interactive-hover);
            text-decoration: underline;
        }

        .login-prompt a:focus-visible {
            outline: none;
            box-shadow: var(--shadow-focus-ring);
            text-decoration: none;
        }

    </style>
</head>
<body>

    <header class="page-header">
        <svg class="logo" width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Fintech App Logo">
            <rect width="48" height="48" rx="12" fill="var(--color-brand-primary)"/>
            <path d="M20 18H32V22H24V26H30V30H20V18Z" fill="var(--color-on-primary)"/>
        </svg>
    </header>

    <main class="main-content">
        <div class="content-wrapper">
            <h1 class="headline">A smarter way to manage your money.</h1>
            <p class="body-copy">Create your secure account in about 2 minutes. Let's get started.</p>
        </div>
    </main>

    <footer class="page-footer">
        <div class="actions-wrapper">
            <a href="#" class="btn btn-primary">Get Started</a>
            <p class="login-prompt">
                Already have an account? <a href="#">Log In</a>
            </p>
        </div>
    </footer>

</body>
</html>
